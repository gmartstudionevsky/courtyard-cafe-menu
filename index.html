<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F6F1E7" />
  <meta name="description" content="Courtyard Café — летнее меню ARTSTUDIO × MemET&Pir" />
  <title>Courtyard Café — Летнее меню</title>
  <link rel="preload" href="./fonts/HistoryPro-Two.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="preload" href="./fonts/circe.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <nav class="section-nav" id="menuNavigation" aria-label="Разделы меню">
    <a href="#drinks">Напитки</a>
    <a href="#meze">Мезе</a>
    <a href="#snacks">Закуски</a>
    <a href="#desserts">Десерты</a>
    <a href="#salads">Салаты</a>
    <a href="#tea-coffee">Чай и кофе</a>
    <a href="#bar">Бар</a>
    <a href="#cocktails">Коктейли</a>
  </nav>

  <main class="menu" aria-label="Страницы меню">
    <section id="summer" class="menu-page" aria-label="Летний выбор">
      <h2 class="visually-hidden">Летний выбор</h2>
      <img src="./assets/Pages/1.jpg" width="1055" height="1491" alt="Летнее меню Courtyard Café — летний выбор" fetchpriority="high" loading="eager" decoding="async" />
    </section>

    <section id="drinks" class="menu-page" aria-label="Напитки">
      <h2 class="visually-hidden">Напитки</h2>
      <img src="./assets/Pages/2.jpg" width="1055" height="1491" alt="Домашние лимонады и холодные напитки" loading="lazy" decoding="async" />
    </section>

    <section id="meze" class="menu-page" aria-label="Мезе к столу">
      <h2 class="visually-hidden">Мезе к столу</h2>
      <img src="./assets/Pages/3.jpg" width="1055" height="1491" alt="Мезе к столу" loading="lazy" decoding="async" />
    </section>

    <section id="snacks" class="menu-page" aria-label="Закуски">
      <h2 class="visually-hidden">Закуски</h2>
      <img src="./assets/Pages/4.jpg" width="1055" height="1491" alt="Сыры, рыба и мясные закуски" loading="lazy" decoding="async" />
    </section>

    <section id="desserts" class="menu-page" aria-label="Десерты">
      <h2 class="visually-hidden">Десерты</h2>
      <img src="./assets/Pages/5.jpg" width="1055" height="1491" alt="Турецкие сладости и десерты" loading="lazy" decoding="async" />
    </section>

    <section id="salads" class="menu-page" aria-label="Салаты">
      <h2 class="visually-hidden">Салаты</h2>
      <img src="./assets/Pages/6.jpg" width="1055" height="1491" alt="Салаты" loading="lazy" decoding="async" />
    </section>

    <section id="tea-coffee" class="menu-page" aria-label="Чай и кофе">
      <h2 class="visually-hidden">Чай и кофе</h2>
      <img src="./assets/Pages/7.jpg" width="1055" height="1491" alt="Чай и кофе" loading="lazy" decoding="async" />
    </section>

    <section id="bar" class="menu-page" aria-label="Барная карта">
      <h2 class="visually-hidden">Барная карта</h2>
      <img src="./assets/Pages/8.jpg" width="1055" height="1491" alt="Барная карта, вино, пиво и сидр 18+" loading="lazy" decoding="async" />
    </section>

    <section id="cocktails" class="menu-page" aria-label="Коктейли">
      <h2 class="visually-hidden">Коктейли</h2>
      <img src="./assets/Pages/9.jpg" width="1055" height="1491" alt="Коктейли 18+" loading="lazy" decoding="async" />
    </section>
  </main>

  <script>
    (() => {
      const nav = document.getElementById('menuNavigation');
      const links = Array.from(document.querySelectorAll('.section-nav a'));
      const sections = links
        .map((link) => document.querySelector(link.getAttribute('href')))
        .filter(Boolean);

      if (!nav) return;

      let lastY = window.scrollY;
      let ticking = false;
      let keepVisibleUntil = 0;

      function showNavigation() {
        nav.classList.remove('is-hidden');
      }

      function hideNavigation() {
        if (document.activeElement && nav.contains(document.activeElement)) return;
        nav.classList.add('is-hidden');
      }

      function updateNavigationVisibility() {
        const currentY = Math.max(window.scrollY, 0);
        const delta = currentY - lastY;
        const nearTop = currentY < 32;
        const locked = Date.now() < keepVisibleUntil;

        if (nearTop || locked) {
          showNavigation();
        } else if (delta > 8 && currentY > 110) {
          hideNavigation();
        } else if (delta < -8) {
          showNavigation();
        }

        lastY = currentY;
        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          window.requestAnimationFrame(updateNavigationVisibility);
          ticking = true;
        }
      }, { passive: true });

      links.forEach((link) => {
        link.addEventListener('click', () => {
          keepVisibleUntil = Date.now() + 700;
          showNavigation();
        });
      });

      if ('IntersectionObserver' in window && sections.length) {
        const observer = new IntersectionObserver((entries) => {
          const visible = entries
            .filter((entry) => entry.isIntersecting)
            .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];

          if (!visible) return;

          links.forEach((link) => {
            const isActive = link.getAttribute('href') === `#${visible.target.id}`;
            link.toggleAttribute('aria-current', isActive);
          });
        }, {
          root: null,
          threshold: [0.34, 0.5, 0.66],
          rootMargin: '-18% 0px -58% 0px'
        });

        sections.forEach((section) => observer.observe(section));
      }
    })();
  </script>
</body>
</html>
